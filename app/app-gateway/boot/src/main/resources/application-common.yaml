spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service-route
            uri: lb://app-platform-user
            predicates:
              - Path=/user/**
          - id: ai-chat-service-route
            uri: lb://app-platform-ai-chat
            predicates:
              - Path=/aiChat/**
          - id: ai-engine-service-route
            uri: lb://boot-ai-engine
            predicates:
              - Path=/aiEngine/**

athena:
  security:
    enabled: true
    auth:
      enabled: true
    token:
      type: jwt
      jwt:
        enabled: true

gateway:
  security:
    enabled: true
    require-token: true
    header-name: Authorization
    token-prefix: Bearer
    ignore-urls:
      - /actuator/**
      - /health/**
      - /user/auth/**
      - /error
      - /favicon.ico
    permission:
      enabled: false
      app-code: app-platform-user
      required-permissions-header: X-Gateway-Required-Permissions
